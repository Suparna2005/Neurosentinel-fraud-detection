[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

# Proxy API requests to your working Vercel backend
[[redirects]]
  from = "/api/*"
  to = "https://neurosentinel-fraud-detection12.vercel.app/api/:splat"
  status = 200

# Catch-all for React Router (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
